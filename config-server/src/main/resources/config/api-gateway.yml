server:
  port: 8080
spring:
  application:
    name: api-gateway
cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE]

      routes:
        - id: auth-auth
          uri: lb://auth-service
          predicates:
            - Path=/api/auth-service/auth/**
          filters:
            - RewritePath=/api/auth-service/(?<path>.*), /api/${path}

        - id: auth-users
          uri: lb://auth-service
          predicates:
            - Path=/api/auth-service/users/**
          filters:
            - RewritePath=/api/auth-service/(?<path>.*), /api/${path}

        - id: auth-roles
          uri: lb://auth-service
          predicates:
            - Path=/api/auth-service/roles/**
          filters:
            - RewritePath=/api/auth-service/(?<path>.*), /api/${path}

        - id: customer-customers
          uri: lb://customer-service
          predicates:
            - Path=/api/customer-service/customers/**
          filters:
            - RewritePath=/api/customer-service/(?<path>.*), /api/${path}

        - id: customer-cities
          uri: lb://customer-service
          predicates:
            - Path=/api/customer-service/cities/**
          filters:
            - RewritePath=/api/customer-service/(?<path>.*), /api/${path}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

security:
  jwt:
    secret: "MySuperSecretKeyForJwt1234567890MyExtra"
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    urls:
      - name: auth-service
        url: /api/auth-service/v3/api-docs
      - name: customer-service
        url: /api/customer-service/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"
