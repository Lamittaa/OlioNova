server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ai-prediction-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:MySuperSecretKeyForJwt1234567890MyExtra}
  api-key:
    internal: ${SECURITY_API_KEY_INTERNAL:internal-dev-key}
    admin: ${SECURITY_API_KEY_ADMIN:admin-dev-key}

clients:
  production-stages:
    url: ${PRODUCTION_STAGES_URL:http://localhost:9030}

ai:
  storage:
    root: ${AI_STORAGE_ROOT:./storage/ai-prediction}
