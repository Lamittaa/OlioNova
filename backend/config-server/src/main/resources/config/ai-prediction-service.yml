server:
  port: 9082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aidb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

security:
  jwt:
    secret: "MySuperSecretKeyForJwt1234567890MyExtra"
  api-key:
    internal: "internal-dev-key"
    admin: "admin-dev-key"

clients:
  production-stages:
    url: ${PRODUCTION_STAGES_URL:http://localhost:9030}

ai:
  storage:
    root: ./storage/ai-prediction
